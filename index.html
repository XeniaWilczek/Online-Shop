<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online-Shop</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <div class="main-container">
      <h1 class="main-container__heading">Unsere Produkte</h1>
      <div class="main-container__product-container">
        <div class="product">
          <img
            src="./images/Proteinpulver.jpg"
            alt="Proteinpulver"
            class="product__image"
          />
          <div class="product__content">
            <h2 class="product__heading">Sportfit Proteinpulver</h2>
            <p class="product__description">Lorem ipsum dolor sit amet.</p>
            <p class="product__price">6€ <span>8€</span></p>
          </div>
        </div>
        <div class="product">
          <img
            src="./images/Theraband.jpg"
            alt="Theraband"
            class="product__image"
          />
          <div class="product__content">
            <h2 class="product__heading">Sportfit Theraband</h2>
            <p class="product__description">Lorem ipsum dolor sit amet.</p>
            <p class="product__price">13€ <span>15€</span></p>
          </div>
        </div>
        <div class="product">
          <img
            src="./images/Proteinriegel.jpg"
            alt="Proteinriegel"
            class="product__image"
          />
          <div class="product__content">
            <h2 class="product__heading">Sportfit Proteinriegel</h2>
            <p class="product__description">Lorem ipsum dolor sit amet.</p>
            <p class="product__price">1.20€/Stück <span>1.50€/Stück</span></p>
          </div>
        </div>
      </div>
      <button class="main-container__button">Weitere Produkte</button>
    </div>
  </body>
</html>
